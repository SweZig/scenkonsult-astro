name: Supabase — Kör SQL-migration

# Körs manuellt från GitHub Actions-fliken
# OBS: Kör bara EN gång — migrationen är idempotent (CREATE IF NOT EXISTS)
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Skriv "kör" för att bekräfta'
        required: true
        default: ''

jobs:
  migrate:
    name: Kör 001_initial_schema.sql mot Supabase
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'kör' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Installera psql
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Kör SQL-migration
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "▶ Kör 001_initial_schema.sql..."
          psql \
            "postgresql://postgres@db.ejhhgqvtvsmiwxygfqbu.supabase.co:5432/postgres" \
            -f supabase/migrations/001_initial_schema.sql \
            -v ON_ERROR_STOP=1
          echo "✅ Migration klar!"

      - name: Verifiera tabeller
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "▶ Verifierar tabeller..."
          psql \
            "postgresql://postgres@db.ejhhgqvtvsmiwxygfqbu.supabase.co:5432/postgres" \
            -c "\dt public.*" \
            -c "SELECT table_name FROM information_schema.tables WHERE table_schema = 'public' ORDER BY table_name;"
          echo "✅ Verifiering klar!"
