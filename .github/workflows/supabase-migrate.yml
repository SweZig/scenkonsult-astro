name: Supabase - Kor SQL-migration

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Skriv "kor" for att bekrafta'
        required: true
        default: ''

jobs:
  migrate:
    name: Kor 001_initial_schema.sql mot Supabase
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.confirm == 'kor' }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Installera psql
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y postgresql-client

      - name: Kor SQL-migration
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "Kor SQL-migration..."
          psql \
            -h db.ejhhgqvtvsmiwxygfqbu.supabase.co \
            -p 5432 \
            -U postgres \
            -d postgres \
            -f supabase/migrations/001_initial_schema.sql \
            -v ON_ERROR_STOP=1
          echo "Migration klar!"

      - name: Verifiera tabeller
        env:
          PGPASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
        run: |
          echo "Verifierar tabeller..."
          psql \
            -h db.ejhhgqvtvsmiwxygfqbu.supabase.co \
            -p 5432 \
            -U postgres \
            -d postgres \
            -c "SELECT table_name FROM information_schema.tables WHERE table_schema = 'public' ORDER BY table_name;"
          echo "Klart!"
