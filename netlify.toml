[build]
  command = "node netlify/generate-products.mjs && node download_all_images.mjs && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"

[functions]
  directory = "netlify/functions"

# Säkerhetshuvuden
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/_astro/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[redirects]]
  from   = "https://www.scenkonsult.se/*"
  to     = "https://scenkonsult.se/:splat"
  status = 301
  force  = true

[[redirects]]
  from = "/search/*"
  to = "/vara-vanligaste-fragor-faq/"
  status = 301

[[redirects]]
  from = "/requests/*"
  to = "/"
  status = 410

[[redirects]]
