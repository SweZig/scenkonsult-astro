<!DOCTYPE html><html lang="sv"> <head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Admin — Scenkonsult Norden</title><meta name="robots" content="noindex, nofollow"><link rel="preconnect" href="https://fonts.googleapis.com"><link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Source+Sans+3:wght@400;600&display=swap" rel="stylesheet"><link rel="stylesheet" href="/_astro/index.BLtGeP_8.css">
<link rel="stylesheet" href="/_astro/index.DpUzE7MN.css"><script type="module" src="/_astro/hoisted.ChZvK3oG.js"></script></head> <body> <!-- ── LOGIN ───────────────────────────────────────────────── --> <div id="login-screen"> <div class="login-box"> <div class="login-logo">⚙ Scenkonsult Admin</div> <div class="login-sub">Adminpanel — ej publik</div> <input type="password" id="login-pw" placeholder="Adminlösenord" autocomplete="current-password"> <div class="login-error" id="login-error">Fel lösenord, försök igen.</div> <button class="btn-primary" id="login-btn">Logga in</button> </div> </div> <!-- ── APP ─────────────────────────────────────────────────── --> <div id="app"> <!-- Topbar --> <div class="topbar"> <div class="topbar-left"> <div class="topbar-brand">⚙ Admin</div> <div class="topbar-nav"> <button class="nav-btn active" data-view="kanban">📋 Ordrar</button> <button class="nav-btn" data-view="calendar">📅 Kalender</button> </div> </div> <div class="topbar-right"> <span class="unread-badge" id="global-unread">0 nya</span> <button class="btn-sm" id="new-quote-btn" style="border-color:var(--brand-lav);color:var(--brand-lav)">✉ Skicka offert</button> <button class="btn-sm" id="refresh-btn">↻ Uppdatera</button> <button class="btn-sm" id="logout-btn">Logga ut</button> </div> </div> <!-- ── KANBAN VIEW ──────────────────────────────────────── --> <div class="view active" id="view-kanban"> <div class="kanban-header"> <div class="kanban-title">Orderöversikt</div> <div class="kanban-filters"> <input class="filter-input" id="filter-search" placeholder="🔍 Sök kund..." style="width:180px"> <input class="filter-input" type="date" id="filter-from" title="Event från"> <input class="filter-input" type="date" id="filter-to" title="Event till"> </div> </div> <div class="kanban-board" id="kanban-board"> <div class="loading-center"><div class="spinner"></div></div> </div> </div> <!-- ── CALENDAR VIEW ────────────────────────────────────── --> <div class="view" id="view-calendar"> <div class="cal-header"> <div class="cal-title" id="cal-month-label">—</div> <div class="cal-nav"> <button class="cal-nav-btn" id="cal-prev">◀</button> <button class="cal-nav-btn" id="cal-today">Idag</button> <button class="cal-nav-btn" id="cal-next">▶</button> </div> </div> <div class="cal-grid"> <div class="cal-weekdays"> <div class="cal-weekday">Mån</div><div class="cal-weekday">Tis</div> <div class="cal-weekday">Ons</div><div class="cal-weekday">Tor</div> <div class="cal-weekday">Fre</div><div class="cal-weekday">Lör</div> <div class="cal-weekday">Sön</div> </div> <div class="cal-days" id="cal-days"></div> </div> </div> </div> <!-- ── OFFERT-MODAL ──────────────────────────────────────────── --> <div class="modal-overlay" id="quote-overlay"> <div class="modal" style="max-width:640px"> <div class="modal-head"> <div class="modal-title">✉ Skicka offert till kund</div> <button class="panel-close" id="quote-close">✕</button> </div> <div class="modal-body" id="quote-body"> <!-- Kunduppgifter --> <div class="section-label" style="margin-top:0">Kunduppgifter</div> <div class="form-row"> <div><label class="form-label">Namn *</label><input class="form-input" id="qc-name" placeholder="För- och efternamn" style="background:#0f0d2a!important;color:#f0eeff!important;color-scheme:dark;"></div> <div><label class="form-label">E-post *</label><input class="form-input" type="email" id="qc-email" placeholder="kund@exempel.se" style="background:#0f0d2a!important;color:#f0eeff!important;color-scheme:dark;"></div> </div> <div class="form-row"> <div><label class="form-label">Telefon</label><input class="form-input" id="qc-phone" placeholder="070 000 00 00" style="background:#0f0d2a!important;color:#f0eeff!important;color-scheme:dark;"></div> <div><label class="form-label">Eventdatum</label><input class="form-input" type="date" id="qc-date" style="background:#0f0d2a!important;color:#f0eeff!important;color-scheme:dark;"></div> </div> <div class="form-row full" style="margin-bottom:0"> <div><label class="form-label">Plats / Adress</label><input class="form-input" id="qc-location" placeholder="Lokal eller adress" style="background:#0f0d2a!important;color:#f0eeff!important;color-scheme:dark;"></div> </div> <!-- Produktväljare --> <div class="section-label">Lägg till produkter</div> <div style="display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:0.5rem;align-items:end;margin-bottom:0.75rem" id="quote-picker-row"> <div> <label class="form-label">Kategori</label> <select id="qp-cat" onchange="quotePickerCat()" style="width:100%;background:#0f0d2a!important;color:#f0eeff!important;color-scheme:dark;border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:0.55rem 0.75rem;font-family:inherit;font-size:0.82rem"> <option value="">— välj —</option> </select> </div> <div id="qp-sub-wrap" style="display:none"> <label class="form-label">Underkategori</label> <select id="qp-sub" onchange="quotePickerSub()" style="width:100%;background:#0f0d2a!important;color:#f0eeff!important;color-scheme:dark;border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:0.55rem 0.75rem;font-family:inherit;font-size:0.82rem"> <option value="">— välj —</option> </select> </div> <div id="qp-prod-wrap"> <label class="form-label">Produkt</label> <select id="qp-prod" style="width:100%;background:#0f0d2a!important;color:#f0eeff!important;color-scheme:dark;border:1px solid rgba(255,255,255,0.12);border-radius:8px;padding:0.55rem 0.75rem;font-family:inherit;font-size:0.82rem"> <option value="">— välj kategori —</option> </select> </div> <button class="btn-action btn-success" onclick="quotePickerAdd()" style="height:34px;padding:0 0.75rem;font-size:0.82rem;white-space:nowrap">＋ Lägg till</button> </div> <!-- Produkttabell --> <table class="quote-prod-table" id="quote-prod-table"> <thead><tr> <th>Produkt / Tjänst</th> <th style="width:80px;text-align:center">Antal</th> <th style="width:100px;text-align:right">à-pris (kr)</th> <th style="width:80px;text-align:right">Summa</th> <th style="width:28px"></th> </tr></thead> <tbody id="quote-prod-tbody"></tbody> <tfoot id="quote-prod-tfoot"></tfoot> </table> <!-- Anmärkning --> <div class="section-label" style="margin-top:1rem">Anmärkning (synlig för kunden)</div> <textarea class="form-input" id="qc-note" rows="3" placeholder="Leveransinfo, villkor, övrigt..." style="background:#0f0d2a!important;color:#f0eeff!important;color-scheme:dark;resize:vertical;min-height:70px"></textarea> <div id="quote-error" style="display:none;margin-top:0.75rem;padding:0.75rem;background:var(--red-bg);border-radius:8px;color:var(--red);font-size:0.85rem"></div> </div> <div class="modal-foot"> <button class="btn-action" onclick="closeQuoteModal()">Avbryt</button> <button class="btn-action btn-success" id="quote-send-btn" onclick="sendQuote()">✉ Skicka offert</button> </div> </div> </div> <!-- ── DETAIL PANEL ─────────────────────────────────────────── --> <div id="detail-overlay"></div> <div id="detail-panel"> <div class="panel-header"> <div class="panel-title" id="panel-title">Varukorg</div> <button class="panel-close" id="panel-close">✕</button> </div> <div class="panel-tabs"> <button class="panel-tab active" data-tab="info">ℹ Info</button> <button class="panel-tab" data-tab="products">📦 Produkter</button> <button class="panel-tab" data-tab="chat">💬 Chatt <span id="chat-unread-badge" style="display:none;background:var(--red);color:#fff;border-radius:99px;padding:1px 6px;font-size:0.7rem;margin-left:4px"></span></button> <button class="panel-tab" data-tab="log">📜 Logg</button> </div> <div class="panel-body" id="panel-body"> <div class="loading-center"><div class="spinner"></div></div> </div> <div class="panel-footer" id="panel-footer"></div> </div> <!-- ── TOAST ─────────────────────────────────────────────────── --> <div id="toast"></div>  </body> </html>
